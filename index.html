<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Ventas e Ingresos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-gray-800 border-b pb-4">Registro de Ventas</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-xl shadow-lg sticky top-8">
                    <h2 class="text-lg font-semibold mb-4 text-blue-600">Nueva Operación</h2>
                    <form id="ventaForm" class="space-y-4">
                        <div class="col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Cliente</label>
                            <input type="text" id="cliente" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Nombre y apellido">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Monto Total (Con IVA 15%)</label>
                            <input type="number" id="montoTotal" step="0.01" class="w-full border-2 border-blue-100 p-3 rounded-lg text-lg focus:border-blue-500 outline-none transition" placeholder="0.00" required>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
                                <label class="block text-[10px] text-gray-500 uppercase font-bold">Costo Base</label>
                                <div class="flex items-center text-gray-700 font-mono">
                                    <span>$</span>
                                    <input type="number" id="costoBase" class="w-full bg-transparent font-bold outline-none" readonly>
                                </div>
                            </div>

                            <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
                                <label class="block text-[10px] text-blue-500 uppercase font-bold">Comisión (10%)</label>
                                <div class="flex items-center text-blue-700 font-mono">
                                    <span>$</span>
                                    <input type="number" id="comision" class="w-full bg-transparent font-bold outline-none" readonly>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Tipo de Pago</label>
                            <select id="tipo" class="w-full border border-gray-300 p-2.5 rounded-lg bg-white">
                                <option value="Contado">Contado</option>
                                <option value="Crédito">Crédito</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Descripción / Concepto</label>
                            <input type="text" id="descripcion" class="w-full border border-gray-300 p-2.5 rounded-lg" placeholder="Ej. Sarten de 8 pulgadas" maxlength="100">
                        </div>

                        <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-95">
                            Registrar Venta
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200">
                                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">Fecha / Descripción</th>
                                    <th class="p-4 text-xs font-bold text-gray-400 uppercase text-right">Monto (Base)</th>
                                    <th class="p-4 text-xs font-bold text-gray-400 uppercase text-right">Comisión</th>
                                    <th class="p-4 text-xs font-bold text-gray-400 uppercase text-center">Tipo</th>
                                </tr>
                            </thead>
                            <tbody id="tablaCuerpo" class="divide-y divide-gray-100">
                                </tbody>
                        </table>
                    </div>
                    <div id="sinDatos" class="hidden p-8 text-center text-gray-400 italic">
                        No hay ventas registradas aún.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const montoTotalInput = document.getElementById('montoTotal');
        const costoBaseInput = document.getElementById('costoBase');
        const comisionInput = document.getElementById('comision');
        const form = document.getElementById('ventaForm');
        const tablaCuerpo = document.getElementById('tablaCuerpo');

        // Lógica de cálculo: Desglose IVA 15% y Comisión 10%
        montoTotalInput.addEventListener('input', () => {
            const total = parseFloat(montoTotalInput.value) || 0;
            const base = total / 1.15; // Quita el 15% de IVA
            const comision = base * 0.10; // 10% sobre el costo base

            costoBaseInput.value = base.toFixed(2);
            comisionInput.value = comision.toFixed(2);
        });

        // Función para cargar ventas desde el servidor
        async function cargarVentas() {
            try {
                const res = await fetch('/api/ventas');
                const ventas = await res.json();
                
                if (ventas.length === 0) {
                    document.getElementById('sinDatos').classList.remove('hidden');
                    tablaCuerpo.innerHTML = '';
                    return;
                }
                
                document.getElementById('sinDatos').classList.add('hidden');
                tablaCuerpo.innerHTML = ventas.reverse().map(v => `
                    <tr class="hover:bg-blue-50/30 transition-colors">
                        <td class="p-4">
                            <div class="text-[10px] text-gray-400 font-mono">${v.fecha}</div>
                            <div class="font-bold text-blue-900 text-sm uppercase tracking-tight">${v.cliente}</div>
                            <div class="text-xs text-gray-500 italic">${v.descripcion || 'Sin detalles'}</div>
                        </td>
                        <td class="p-4 text-right">
                            <div class="text-sm font-bold text-gray-900">$${parseFloat(v.costoBase).toLocaleString()}</div>
                            <div class="text-[10px] text-gray-400 font-normal">Total con IVA: $${parseFloat(v.montoTotal).toLocaleString()}</div>
                        </td>
                        <td class="p-4 text-right">
                            <div class="flex flex-col items-end">
                                <span class="font-bold ${v.comisionPagada ? 'text-gray-400 line-through' : 'text-blue-600'}">
                                    $${v.comision}
                                </span>
                                <label class="flex items-center mt-1 cursor-pointer">
                                    <input type="checkbox" 
                                        ${v.comisionPagada ? 'checked' : ''} 
                                        onchange="togglePago(${v._id}, this.checked)"
                                        class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                                    <span class="ml-2 text-[10px] font-medium text-gray-500 uppercase">
                                        ${v.comisionPagada ? 'Pagada' : 'Pendiente'}
                                    </span>
                                </label>
                            </div>
                        </td>
                        <td class="p-4 text-center">
                            <span class="inline-block px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ${v.tipo === 'Contado' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                                ${v.tipo}
                            </span>
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="eliminarVenta(${v._id}, '${v.cliente}')" 
                                    class="text-red-400 hover:text-red-600 transition-colors p-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Error al cargar ventas:", err);
            }
        }

        // Función para guardar una nueva venta
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nuevaVenta = {
                id: Date.now(),
                cliente: document.getElementById('cliente').value || 'Cliente General', // Nuevo campo
                montoTotal: montoTotalInput.value,
                costoBase: costoBaseInput.value,
                comision: comisionInput.value,
                tipo: document.getElementById('tipo').value,
                descripcion: document.getElementById('descripcion').value,
                comisionPagada: false,
                fecha: new Date().toLocaleString()
            };

            try {
                const response = await fetch('/api/ventas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevaVenta)
                });

                if (response.ok) {
                    form.reset();
                    costoBaseInput.value = '';
                    comisionInput.value = '';
                    cargarVentas();
                }
            } catch (err) {
                alert("Error al conectar con el servidor");
            }
        });

        // Carga inicial
        cargarVentas();
        async function togglePago(id, estado) {
            try {
                await fetch(`/api/ventas/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comisionPagada: estado })
                });
                cargarVentas(); // Recarga la tabla para aplicar los estilos visuales
            } catch (err) {
                alert("Error al actualizar el pago");
            }
        }
        async function eliminarVenta(id, nombreCliente) {
            // El 'event' de confirmación detiene la acción si el usuario cancela
            const mensaje = `¿Estás seguro de eliminar la venta de "${nombreCliente}"?\nEsta acción no se puede deshacer.`;
            
            if (confirm(mensaje)) {
                try {
                    const res = await fetch(`/api/ventas/${id}`, {
                        method: 'DELETE'
                    });

                    if (res.ok) {
                        // Recargamos la tabla para que el registro desaparezca visualmente
                        cargarVentas();
                    }
                } catch (err) {
                    alert("Error al intentar eliminar el registro.");
                }
            }
        }
    </script>
</body>
</html>
